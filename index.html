<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanPro — Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080C14;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
    }
    .splash {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .splash-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #00D4AA, #6C63FF);
      border-radius: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0,212,170,0.3);
      animation: float 2s ease-in-out infinite;
    }
    .splash-name {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #00D4AA, #6C63FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .splash-sub { color: #8896B3; font-size: 14px; margin-bottom: 32px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,212,170,0.2);
      border-top-color: #00D4AA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="splash">
    <div class="splash-logo">🧹</div>
    <div class="splash-name">CleanPro</div>
    <div class="splash-sub">Cleaning Service Patrol & Activity Monitoring</div>
    <div class="spinner"></div>
  </div>
  <script>
    // Check existing session and redirect
    setTimeout(() => {
      const session = sessionStorage.getItem('cp_session') || localStorage.getItem('cp_session');
      if (session) {
        try {
          const user = JSON.parse(session);
          if (user.role === 'supervisor') window.location.href = 'pages/supervisor/dashboard.html';
          else window.location.href = 'pages/leader/dashboard.html';
          return;
        } catch(e) {}
      }
      window.location.href = 'login.html';
    }, 800);
  </script>
</body>
</html>
