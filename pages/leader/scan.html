<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanPro — Scan Task</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-bg-noise"></div>

  <script src="../../config/config.js"></script>
  <script src="../../services/supabase.js"></script>
  <script src="../../services/auth.js"></script>
  <script src="../../services/task.js"></script>
  <script src="../../services/upload.js"></script>
  <script src="../../utils/helper.js"></script>
  <script src="../../components/layout.js"></script>

  <script>
    const user = AuthService.requireAuth();
    if (!user) throw new Error('Not authorized');

    // Block if not on shift (for leader)
    if (user.role === 'leader' && !AuthService.isOnShift()) {
      alert('Anda sedang di luar jam shift. Tidak bisa input task.');
      window.location.href = 'dashboard.html';
    }

    let qrScanner = null;
    let currentArea = null;
    let checklistItems = [];
    let selectedPhotos = [];

    document.addEventListener('DOMContentLoaded', () => {
      document.body.insertAdjacentHTML('afterbegin', buildLayout());
      Sidebar.init();
      initScanner();
    });

    function buildSidebar() {
      const isSuper = user.role === 'supervisor';
      return `
        <nav class="sidebar" id="sidebar">
          <div class="sidebar-logo">
            <div class="logo-icon">🧹</div>
            <div class="logo-text">CleanPro<span>Monitoring System</span></div>
          </div>
          <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
            <a href="scan.html" class="nav-item active"><span class="nav-icon">📷</span><span class="nav-label">Scan Task</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📋</span><span class="nav-label">Riwayat Saya</span></a>
            ${isSuper ? `<a href="../supervisor/users.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">User Management</span></a>` : ''}
          </div>
          <div class="sidebar-footer">
            <div class="sidebar-user">
              <div class="user-avatar">${getInitials(user.nama)}</div>
              <div class="user-info">
                <div class="user-name">${user.nama}</div>
                <div class="user-role">${user.role === 'supervisor' ? 'Supervisor' : 'Leader'}</div>
              </div>
            </div>
            <div class="divider"></div>
            <div class="nav-item" onclick="AuthService.logout()" style="color:var(--danger);cursor:pointer">
              <span class="nav-icon">🚪</span><span class="nav-label">Keluar</span>
            </div>
          </div>
        </nav>
      `;
    }

    function buildLayout() {
      return `
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        ${buildSidebar()}
        <div class="main-content" id="mainContent">
          <header class="topbar" id="topbar">
            <button class="topbar-toggle" onclick="Sidebar.toggle()">☰</button>
            <div class="topbar-breadcrumb">Scan Task<small>QR Patrol & Checklist</small></div>
          </header>
          <main class="page-content">

            <!-- Step 1: QR Scanner -->
            <div id="step1" class="anim-fade-up">
              <div class="card mb-16">
                <div class="section-header mb-16">
                  <div>
                    <div class="section-title">📷 Scan QR Area</div>
                    <div class="section-subtitle">Arahkan kamera ke QR code area patrol</div>
                  </div>
                </div>

                <div class="qr-container mb-16" style="min-height:280px;position:relative;border-radius:16px;overflow:hidden">
                  <div id="qr-reader" style="width:100%"></div>
                  <div class="qr-scanner-overlay" id="scannerOverlay">
                    <div class="qr-frame">
                      <div class="qr-frame-corner"></div>
                      <div class="qr-frame-corner"></div>
                      <div class="qr-frame-corner"></div>
                      <div class="qr-frame-corner"></div>
                      <div class="qr-scan-line"></div>
                    </div>
                  </div>
                </div>

                <div style="text-align:center;margin-bottom:16px">
                  <div style="font-size:13px;color:var(--text-secondary)">— atau —</div>
                </div>

                <div style="display:flex;gap:10px">
                  <div class="form-control-icon" style="flex:1">
                    <span class="form-icon">🔍</span>
                    <input type="text" id="manualQR" class="form-control" placeholder="Masukkan kode QR manual...">
                  </div>
                  <button class="btn btn-outline" onclick="handleManualQR()">Cari</button>
                </div>
              </div>
            </div>

            <!-- Step 2: Checklist Form (hidden initially) -->
            <div id="step2" style="display:none">
              <!-- Area header -->
              <div class="card mb-16 anim-fade-up" id="areaHeader"></div>

              <!-- Checklist -->
              <div class="card mb-16 anim-fade-up-delay-1">
                <div class="section-title mb-16">✅ Checklist Pekerjaan</div>
                <div id="checklistContainer">
                  <div class="skeleton skeleton-text"></div>
                  <div class="skeleton skeleton-text"></div>
                  <div class="skeleton skeleton-text"></div>
                </div>
              </div>

              <!-- Photo Upload -->
              <div class="card mb-16 anim-fade-up-delay-2">
                <div class="section-header mb-12">
                  <div class="section-title">📷 Upload Foto</div>
                  <span class="badge badge-muted">Max 2 foto</span>
                </div>

                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('photoInput').click()">
                  <input type="file" id="photoInput" accept="image/jpeg,image/jpg,image/png,image/webp"
                         multiple style="display:none" onchange="handlePhotoSelect(event)">
                  <div class="upload-icon">📸</div>
                  <div class="upload-text">Tap untuk pilih foto</div>
                  <div class="upload-hint">JPG, PNG, WebP · Max 5MB · Akan dikompres otomatis</div>
                </div>

                <!-- Camera capture button -->
                <div style="display:flex;gap:8px;margin-top:10px">
                  <button class="btn btn-outline btn-sm" onclick="openCamera()" style="flex:1">
                    📸 Kamera
                  </button>
                  <button class="btn btn-outline btn-sm" onclick="document.getElementById('photoInput').click()" style="flex:1">
                    🖼️ Galeri
                  </button>
                </div>

                <div class="photo-previews" id="photoPreviews"></div>
              </div>

              <!-- Note -->
              <div class="card mb-16 anim-fade-up-delay-3">
                <div class="section-title mb-12">📝 Keterangan / Note</div>
                <textarea id="taskNote" class="form-control" placeholder="Tambahkan catatan (opsional)..." rows="3"></textarea>
              </div>

              <!-- Actions -->
              <div style="display:flex;gap:10px;margin-bottom:32px">
                <button class="btn btn-outline" onclick="resetToScan()" style="flex:0 0 auto">
                  ← Scan Ulang
                </button>
                <button class="btn btn-primary" onclick="submitTask()" style="flex:1" id="submitBtn">
                  <span id="submitText">✅ Submit Task</span>
                  <span id="submitSpinner" style="display:none">⏳ Menyimpan...</span>
                </button>
              </div>
            </div>

          </main>
        </div>
      `;
    }

    // ── QR Scanner ──
    function initScanner() {
      whenReady(() => {
        qrScanner = new Html5Qrcode('qr-reader');
        qrScanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (decodedText) => onQRScanned(decodedText),
          () => {}
        ).then(() => {
          document.getElementById('scannerOverlay').style.display = 'flex';
        }).catch((e) => {
          document.getElementById('scannerOverlay').style.display = 'none';
          Toast.warning('Kamera tidak tersedia. Gunakan input manual.');
        });
      });
    }

    function stopScanner() {
      if (qrScanner) {
        qrScanner.stop().catch(() => {});
        qrScanner = null;
      }
    }

    async function onQRScanned(code) {
      stopScanner();
      Toast.info('QR terdeteksi! Memuat area...');
      await loadAreaByQR(code);
    }

    async function handleManualQR() {
      const code = document.getElementById('manualQR').value.trim();
      if (!code) { Toast.warning('Masukkan kode QR terlebih dahulu.'); return; }
      await loadAreaByQR(code);
    }

    async function loadAreaByQR(code) {
      const { data: area, error } = await TaskService.getAreaByQR(code);
      if (error || !area) {
        Toast.error('Area tidak ditemukan untuk kode QR ini.');
        return;
      }

      currentArea = area;

      // Load checklist for area
      const { data: checklist } = await TaskService.getAreaChecklist(area.id);
      checklistItems = (checklist || []).map(c => ({ ...c, checked: false }));

      // Render step 2
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';

      document.getElementById('areaHeader').innerHTML = `
        <div style="display:flex;align-items:center;gap:16px">
          <div style="width:52px;height:52px;border-radius:14px;background:var(--primary-dim);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">📍</div>
          <div>
            <div style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--primary)">${area.nama_area}</div>
            <div style="font-size:13px;color:var(--text-secondary)">${area.kategori || 'Area Patrol'} · ${DateUtils.formatDateTime(new Date().toISOString())}</div>
          </div>
          <div class="badge badge-success" style="margin-left:auto">✓ Terdeteksi</div>
        </div>
      `;

      renderChecklist();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderChecklist() {
      const container = document.getElementById('checklistContainer');
      if (!checklistItems.length) {
        container.innerHTML = renderEmptyState('📋', 'Tidak ada checklist', 'Hubungi supervisor untuk setup checklist area ini.');
        return;
      }

      container.innerHTML = checklistItems.map((item, i) => `
        <div class="checklist-item ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${i})" id="check-${i}">
          <div class="checklist-check">
            <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
              <path d="M1 4L4.5 7.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="checklist-label">${item.item_checklist}</span>
        </div>
      `).join('');
    }

    function toggleCheck(i) {
      checklistItems[i].checked = !checklistItems[i].checked;
      const el = document.getElementById(`check-${i}`);
      el.classList.toggle('checked', checklistItems[i].checked);
    }

    // ── Photo Handling ──
    function openCamera() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.onchange = (e) => handlePhotoSelect(e);
      input.click();
    }

    function handlePhotoSelect(event) {
      const files = Array.from(event.target.files || []);
      const max = window.CLEANPRO_CONFIG.IMAGE.MAX_PER_TASK;
      const remaining = max - selectedPhotos.length;

      if (remaining <= 0) {
        Toast.warning(`Maksimal ${max} foto per task.`);
        return;
      }

      const toAdd = files.slice(0, remaining);
      toAdd.forEach(file => {
        const v = UploadService.validateFile(file);
        if (!v.valid) { Toast.error(v.message); return; }
        selectedPhotos.push(file);
      });

      renderPhotoPreviews();
      event.target.value = '';
    }

    function renderPhotoPreviews() {
      const container = document.getElementById('photoPreviews');
      container.innerHTML = selectedPhotos.map((file, i) => {
        const url = URL.createObjectURL(file);
        return `
          <div class="photo-preview-item">
            <img src="${url}" alt="preview">
            <button class="photo-preview-remove" onclick="removePhoto(${i})">✕</button>
          </div>
        `;
      }).join('');
    }

    function removePhoto(i) {
      selectedPhotos.splice(i, 1);
      renderPhotoPreviews();
    }

    // ── Submit ──
    async function submitTask() {
      if (!currentArea) { Toast.error('Area belum dipilih.'); return; }

      const note = document.getElementById('taskNote').value.trim();
      const btn = document.getElementById('submitBtn');
      const submitText = document.getElementById('submitText');
      const submitSpinner = document.getElementById('submitSpinner');

      btn.disabled = true;
      submitText.style.display = 'none';
      submitSpinner.style.display = 'inline';

      const result = await TaskService.submitTask({
        userId: user.id,
        areaId: currentArea.id,
        note,
        checklistItems,
        photoFiles: selectedPhotos,
      });

      btn.disabled = false;
      submitText.style.display = 'inline';
      submitSpinner.style.display = 'none';

      if (result.success) {
        Toast.success('Task berhasil disimpan!');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } else {
        Toast.error('Gagal menyimpan: ' + result.message);
      }
    }

    function resetToScan() {
      currentArea = null;
      checklistItems = [];
      selectedPhotos = [];
      document.getElementById('step1').style.display = 'block';
      document.getElementById('step2').style.display = 'none';
      document.getElementById('manualQR').value = '';
      initScanner();
    }
  </script>
</body>
</html>
