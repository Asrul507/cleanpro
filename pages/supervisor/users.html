<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanPro — User Management</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-bg-noise"></div>
  <script src="../../config/config.js"></script>
  <script src="../../services/supabase.js"></script>
  <script src="../../services/auth.js"></script>
  <script src="../../utils/helper.js"></script>

  <style>
    .user-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--bg-input);
      border-radius: var(--border-radius-sm);
      border: 1px solid var(--glass-border);
      transition: all var(--transition-base);
      margin-bottom: 8px;
    }
    .user-card:hover { border-color: rgba(255,255,255,0.1); background: var(--bg-elevated); }
    .user-card.inactive { opacity: 0.5; }
    .user-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }
  </style>

  <script>
    const user = AuthService.requireAuth('supervisor');
    let users = [];

    document.addEventListener('DOMContentLoaded', () => {
      document.body.insertAdjacentHTML('afterbegin', buildLayout());
      Sidebar.init();
      loadUsers();
    });

    function buildLayout() {
      return `
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        <nav class="sidebar" id="sidebar">
          <div class="sidebar-logo"><div class="logo-icon">🧹</div><div class="logo-text">CleanPro<span>Monitoring System</span></div></div>
          <div class="sidebar-nav">
            <div class="nav-section-label">Monitoring</div>
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
            <a href="scan.html" class="nav-item"><span class="nav-icon">📷</span><span class="nav-label">Scan Task</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Riwayat Semua</span></a>
            <div class="nav-section-label" style="margin-top:8px">Manajemen</div>
            <a href="users.html" class="nav-item active"><span class="nav-icon">👥</span><span class="nav-label">User Management</span></a>
            <a href="areas.html" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Area & QR</span></a>
            <a href="checklists.html" class="nav-item"><span class="nav-icon">✅</span><span class="nav-label">Checklist</span></a>
            <a href="shifts.html" class="nav-item"><span class="nav-icon">📅</span><span class="nav-label">Jadwal Shift</span></a>
            <div class="nav-section-label" style="margin-top:8px">Laporan</div>
            <a href="report.html" class="nav-item"><span class="nav-icon">📄</span><span class="nav-label">Export Laporan</span></a>
          </div>
          <div class="sidebar-footer">
            <div class="sidebar-user"><div class="user-avatar">${getInitials(user.nama)}</div><div class="user-info"><div class="user-name">${user.nama}</div><div class="user-role">Supervisor</div></div></div>
            <div class="divider"></div>
            <div class="nav-item" onclick="AuthService.logout()" style="color:var(--danger);cursor:pointer"><span class="nav-icon">🚪</span><span class="nav-label">Keluar</span></div>
          </div>
        </nav>
        <div class="main-content" id="mainContent">
          <header class="topbar" id="topbar">
            <button class="topbar-toggle" onclick="Sidebar.toggle()">☰</button>
            <div class="topbar-breadcrumb">User Management<small>Kelola akun leader</small></div>
            <div class="topbar-actions">
              <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Tambah User</button>
            </div>
          </header>
          <main class="page-content">

            <!-- Stats -->
            <div class="grid grid-3 mb-20 anim-fade-up" id="userStats">${skeletonCard(3)}</div>

            <!-- User List -->
            <div class="card anim-fade-up-delay-1">
              <div class="section-header mb-16">
                <div class="section-title">👥 Daftar User</div>
                <div class="form-control-icon" style="max-width:220px">
                  <span class="form-icon">🔍</span>
                  <input type="text" id="searchUser" class="form-control" placeholder="Cari nama..." oninput="filterUsers()">
                </div>
              </div>
              <div id="userList">${skeletonCard(3)}</div>
            </div>

          </main>
        </div>

        <!-- Modal Tambah/Edit User -->
        <div class="modal-overlay" id="userModal">
          <div class="modal">
            <div class="modal-header">
              <div class="modal-title" id="modalTitle">Tambah User</div>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="editUserId">
              <div class="form-group">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" id="formNama" class="form-control" placeholder="Nama lengkap">
              </div>
              <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="formUsername" class="form-control" placeholder="username (lowercase, no spasi)">
              </div>
              <div class="form-group" id="passwordGroup">
                <label class="form-label">Password</label>
                <input type="password" id="formPassword" class="form-control" placeholder="Min. 6 karakter">
              </div>
              <div class="form-group">
                <label class="form-label">Role</label>
                <select id="formRole" class="form-control">
                  <option value="leader">Leader</option>
                  <option value="supervisor">Supervisor</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="closeModal()">Batal</button>
              <button class="btn btn-primary" onclick="saveUser()">💾 Simpan</button>
            </div>
          </div>
        </div>

        <!-- Modal Reset Password -->
        <div class="modal-overlay" id="resetModal">
          <div class="modal">
            <div class="modal-header">
              <div class="modal-title">🔑 Reset Password</div>
              <button class="modal-close" onclick="closeResetModal()">✕</button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="resetUserId">
              <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">Reset password untuk: <strong id="resetUserName"></strong></p>
              <div class="form-group">
                <label class="form-label">Password Baru</label>
                <input type="password" id="resetNewPass" class="form-control" placeholder="Min. 6 karakter">
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" onclick="closeResetModal()">Batal</button>
              <button class="btn btn-primary" onclick="doResetPassword()">🔑 Reset</button>
            </div>
          </div>
        </div>
      `;
    }

    async function loadUsers() {
      whenReady(async () => {
        const { data } = await window.db.from('users').select('*').order('nama');
        users = data || [];
        renderStats();
        renderUsers(users);
      });
    }

    function renderStats() {
      const total    = users.length;
      const leaders  = users.filter(u => u.role === 'leader' && u.active).length;
      const supers   = users.filter(u => u.role === 'supervisor').length;
      document.getElementById('userStats').innerHTML = `
        <div class="card stat-card">
          <div class="stat-icon" style="background:var(--success-bg);color:var(--success)">👥</div>
          <div class="stat-value">${total}</div>
          <div class="stat-label">Total User</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon" style="background:var(--info-bg);color:var(--info)">👷</div>
          <div class="stat-value">${leaders}</div>
          <div class="stat-label">Leader Aktif</div>
        </div>
        <div class="card stat-card">
          <div class="stat-icon" style="background:var(--warning-bg);color:var(--warning)">🎯</div>
          <div class="stat-value">${supers}</div>
          <div class="stat-label">Supervisor</div>
        </div>
      `;
    }

    function renderUsers(list) {
      if (!list.length) {
        document.getElementById('userList').innerHTML = renderEmptyState('👥', 'Belum ada user', 'Klik + Tambah User untuk menambahkan.');
        return;
      }
      document.getElementById('userList').innerHTML = list.map(u => `
        <div class="user-card ${!u.active ? 'inactive' : ''}">
          <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--secondary),var(--primary));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:15px;flex-shrink:0">${getInitials(u.nama)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.nama}</div>
            <div style="font-size:12px;color:var(--text-muted)">@${u.username} · ${u.role}</div>
          </div>
          <span class="badge ${u.active ? 'badge-success' : 'badge-danger'}">${u.active ? 'Aktif' : 'Nonaktif'}</span>
          <div class="user-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${u.id}')" title="Edit">✏️</button>
            <button class="btn btn-ghost btn-sm" onclick="openResetModal('${u.id}','${u.nama}')" title="Reset Password">🔑</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleActive('${u.id}',${u.active})" title="${u.active?'Nonaktifkan':'Aktifkan'}">
              ${u.active ? '🔴' : '🟢'}
            </button>
          </div>
        </div>
      `).join('');
    }

    function filterUsers() {
      const q = document.getElementById('searchUser').value.toLowerCase();
      renderUsers(users.filter(u => u.nama.toLowerCase().includes(q) || u.username.toLowerCase().includes(q)));
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Tambah User';
      document.getElementById('editUserId').value = '';
      document.getElementById('formNama').value = '';
      document.getElementById('formUsername').value = '';
      document.getElementById('formPassword').value = '';
      document.getElementById('formRole').value = 'leader';
      document.getElementById('passwordGroup').style.display = 'block';
      document.getElementById('userModal').classList.add('open');
    }

    function openEditModal(id) {
      const u = users.find(x => x.id === id);
      if (!u) return;
      document.getElementById('modalTitle').textContent = 'Edit User';
      document.getElementById('editUserId').value = u.id;
      document.getElementById('formNama').value = u.nama;
      document.getElementById('formUsername').value = u.username;
      document.getElementById('formPassword').value = '';
      document.getElementById('formRole').value = u.role;
      document.getElementById('passwordGroup').style.display = 'none';
      document.getElementById('userModal').classList.add('open');
    }

    function closeModal() { document.getElementById('userModal').classList.remove('open'); }

    async function saveUser() {
      const id       = document.getElementById('editUserId').value;
      const nama     = document.getElementById('formNama').value.trim();
      const username = document.getElementById('formUsername').value.trim().toLowerCase();
      const password = document.getElementById('formPassword').value;
      const role     = document.getElementById('formRole').value;

      if (!nama || !username) { Toast.warning('Nama dan username wajib diisi.'); return; }
      if (!id && password.length < 6) { Toast.warning('Password minimal 6 karakter.'); return; }

      whenReady(async () => {
        if (id) {
          const { error } = await window.db.from('users').update({ nama, username, role }).eq('id', id);
          if (error) { Toast.error('Gagal update: ' + error.message); return; }
          Toast.success('User berhasil diupdate!');
        } else {
          const { error } = await window.db.from('users').insert({ nama, username, password, role, active: true });
          if (error) { Toast.error('Gagal tambah: ' + error.message); return; }
          Toast.success('User berhasil ditambahkan!');
        }
        closeModal();
        loadUsers();
      });
    }

    function openResetModal(id, nama) {
      document.getElementById('resetUserId').value = id;
      document.getElementById('resetUserName').textContent = nama;
      document.getElementById('resetNewPass').value = '';
      document.getElementById('resetModal').classList.add('open');
    }

    function closeResetModal() { document.getElementById('resetModal').classList.remove('open'); }

    async function doResetPassword() {
      const id      = document.getElementById('resetUserId').value;
      const newPass = document.getElementById('resetNewPass').value;
      if (newPass.length < 6) { Toast.warning('Password minimal 6 karakter.'); return; }
      whenReady(async () => {
        const { error } = await window.db.from('users').update({ password: newPass }).eq('id', id);
        if (error) { Toast.error('Gagal reset: ' + error.message); return; }
        Toast.success('Password berhasil direset!');
        closeResetModal();
      });
    }

    async function toggleActive(id, current) {
      whenReady(async () => {
        const { error } = await window.db.from('users').update({ active: !current }).eq('id', id);
        if (error) { Toast.error('Gagal update status.'); return; }
        Toast.success(`User ${current ? 'dinonaktifkan' : 'diaktifkan'}!`);
        loadUsers();
      });
    }
  </script>
</body>
</html>
