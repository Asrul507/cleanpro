<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanPro — Profile Supervisor</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="icon" href="../../assets/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-bg-noise"></div>
  <script src="../../config/config.js"></script>
  <script src="../../services/supabase.js"></script>
  <script src="../../services/auth.js"></script>
  <script src="../../services/task.js"></script>
  <script src="../../utils/helper.js"></script>
  <script>
    const user = AuthService.requireAuth('supervisor');
    document.addEventListener('DOMContentLoaded', () => {
      document.body.insertAdjacentHTML('afterbegin', buildLayout());
      Sidebar.init();
      loadStats();
    });

    function buildLayout() {
      return `
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        <nav class="sidebar" id="sidebar">
          <div class="sidebar-logo"><div class="logo-icon">🧹</div><div class="logo-text">CleanPro<span>Monitoring System</span></div></div>
          <div class="sidebar-nav">
            <div class="nav-section-label">Monitoring</div>
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Dashboard</span></a>
            <a href="scan.html" class="nav-item"><span class="nav-icon">📷</span><span class="nav-label">Scan Task</span></a>
            <a href="history.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Riwayat Semua</span></a>
            <div class="nav-section-label" style="margin-top:8px">Manajemen</div>
            <a href="users.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">User Management</span></a>
            <a href="areas.html" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Area & QR</span></a>
            <a href="checklists.html" class="nav-item"><span class="nav-icon">✅</span><span class="nav-label">Checklist</span></a>
            <a href="shifts.html" class="nav-item"><span class="nav-icon">📅</span><span class="nav-label">Jadwal Shift</span></a>
            <div class="nav-section-label" style="margin-top:8px">Laporan</div>
            <a href="report.html" class="nav-item"><span class="nav-icon">📄</span><span class="nav-label">Export Laporan</span></a>
          </div>
          <div class="sidebar-footer">
            <div class="sidebar-user"><div class="user-avatar">${getInitials(user.nama)}</div><div class="user-info"><div class="user-name">${user.nama}</div><div class="user-role">Supervisor</div></div></div>
            <div class="divider"></div>
            <div class="nav-item" onclick="AuthService.logout()" style="color:var(--danger);cursor:pointer"><span class="nav-icon">🚪</span><span class="nav-label">Keluar</span></div>
          </div>
        </nav>
        <div class="main-content" id="mainContent">
          <header class="topbar" id="topbar">
            <button class="topbar-toggle" onclick="Sidebar.toggle()">☰</button>
            <div class="topbar-breadcrumb">Profile<small>Informasi akun supervisor</small></div>
          </header>
          <main class="page-content">
            <div class="grid grid-2 anim-fade-up">
              <div>
                <div class="card mb-16">
                  <div style="text-align:center;padding:16px 0 8px">
                    <div style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,var(--secondary),var(--primary));display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:32px;font-weight:800;margin-bottom:16px;box-shadow:var(--shadow-primary)">${getInitials(user.nama)}</div>
                    <div style="font-family:var(--font-display);font-size:22px;font-weight:700">${user.nama}</div>
                    <div style="color:var(--text-secondary);font-size:14px;margin-top:4px">@${user.username}</div>
                    <div style="margin-top:10px"><span class="badge badge-success">Supervisor</span></div>
                  </div>
                  <div class="divider"></div>
                  <div style="display:grid;gap:10px">
                    <div style="display:flex;justify-content:space-between;padding:8px 4px"><span style="color:var(--text-secondary);font-size:13px">Username</span><strong>${user.username}</strong></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 4px"><span style="color:var(--text-secondary);font-size:13px">Role</span><strong>Supervisor</strong></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 4px"><span style="color:var(--text-secondary);font-size:13px">Login</span><strong>${DateUtils.formatDateTime(user.loginTime||new Date().toISOString())}</strong></div>
                  </div>
                </div>
                <div class="card" id="statsCard">
                  <div class="section-title mb-16">📊 Statistik Sistem</div>
                  <div id="sysStats">${skeletonCard(1)}</div>
                </div>
              </div>

              <div>
                <div class="card">
                  <div class="section-title mb-4">🔒 Ganti Password</div>
                  <div style="color:var(--text-secondary);font-size:13px;margin-bottom:20px">Perbarui password akun Anda secara berkala.</div>
                  <div id="pwError" style="display:none;background:var(--danger-bg);border:1px solid rgba(255,107,107,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--danger);margin-bottom:16px"></div>
                  <div id="pwSuccess" style="display:none;background:var(--success-bg);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--success);margin-bottom:16px"></div>
                  <div class="form-group">
                    <label class="form-label">Password Lama</label>
                    <input type="password" id="oldPass" class="form-control" placeholder="Password lama">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Password Baru</label>
                    <input type="password" id="newPass" class="form-control" placeholder="Min. 6 karakter">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Konfirmasi</label>
                    <input type="password" id="confirmPass" class="form-control" placeholder="Ulangi password baru">
                  </div>
                  <button class="btn btn-primary w-100" onclick="changePassword()">🔒 Simpan Password</button>
                  <div class="divider"></div>
                  <button class="btn btn-danger w-100" onclick="AuthService.logout()">🚪 Keluar</button>
                </div>
              </div>
            </div>
          </main>
        </div>
      `;
    }

    async function loadStats() {
      const stats = await TaskService.getDashboardStats();
      document.getElementById('sysStats').innerHTML = `
        <div style="display:grid;gap:10px">
          <div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg-input);border-radius:10px">
            <span style="color:var(--text-secondary)">Task Hari Ini</span><strong style="color:var(--primary)">${stats.totalToday}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg-input);border-radius:10px">
            <span style="color:var(--text-secondary)">Leader Aktif</span><strong>${stats.totalUsers}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg-input);border-radius:10px">
            <span style="color:var(--text-secondary)">Total Area</span><strong>${stats.totalAreas}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg-input);border-radius:10px">
            <span style="color:var(--text-secondary)">Area Belum Dicek</span><strong style="color:var(--warning)">${stats.uncheckedAreas}</strong>
          </div>
        </div>`;
    }

    async function changePassword() {
      const oldPass     = document.getElementById('oldPass').value;
      const newPass     = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;
      const errEl = document.getElementById('pwError');
      const sucEl = document.getElementById('pwSuccess');
      errEl.style.display='none'; sucEl.style.display='none';
      if (!oldPass||!newPass||!confirmPass) { errEl.textContent='Semua field wajib diisi.'; errEl.style.display='block'; return; }
      if (newPass.length<6) { errEl.textContent='Min. 6 karakter.'; errEl.style.display='block'; return; }
      if (newPass!==confirmPass) { errEl.textContent='Konfirmasi tidak cocok.'; errEl.style.display='block'; return; }
      const r = await AuthService.changePassword(user.id, oldPass, newPass);
      if (r.success) { sucEl.textContent='✅ Password berhasil diubah!'; sucEl.style.display='block'; document.getElementById('oldPass').value=''; document.getElementById('newPass').value=''; document.getElementById('confirmPass').value=''; }
      else { errEl.textContent=r.message; errEl.style.display='block'; }
    }
  </script>
</body>
</html>
